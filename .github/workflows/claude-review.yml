name: Claude Review

# Automated Claude PR review via Dario proxy on logan-gl502vs.
# Gated: CLAUDE_REVIEW_ENABLED + CLAUDE_REVIEW_CONFIGURED

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    name: Claude review
    if: vars.CLAUDE_REVIEW_ENABLED == 'true' && vars.CLAUDE_REVIEW_CONFIGURED == 'true'
    runs-on: [self-hosted, logan-gl502vs]
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve Dario proxy
        id: dario
        run: |
          set -euo pipefail
          GW=""
          if command -v ip >/dev/null 2>&1; then
            GW="$(ip route 2>/dev/null | awk '/default/{print $3; exit}' || true)"
          fi
          for H in host.containers.internal "$GW" 172.18.0.1 172.17.0.1 127.0.0.1; do
            [ -z "$H" ] && continue
            body_file="$(mktemp)"
            http_code="$(
              curl -sS --max-time 8 -o "$body_file" -w "%{http_code}" \
                -X POST "http://$H:3456/v1/chat/completions" \
                -H 'content-type: application/json' \
                -H 'authorization: Bearer dario' \
                -d '{"model":"claude-haiku-4-5","messages":[{"role":"user","content":"ok"}],"max_tokens":4,"stream":false}' \
                2>/dev/null || echo "000"
            )"
            rm -f "$body_file"
            case "$http_code" in
              200)
                {
                  echo "available=true"
                  echo "base_url=http://$H:3456"
                } >> "$GITHUB_OUTPUT"
                echo "Dario proxy reachable at $H:3456"
                exit 0
                ;;
              402|429)
                echo "available=false" >> "$GITHUB_OUTPUT"
                echo "::warning::Dario quota exhausted (HTTP $http_code); Claude review skipped."
                exit 0
                ;;
            esac
          done

          echo "available=false" >> "$GITHUB_OUTPUT"
          echo "::warning::Dario proxy (:3456) unreachable from the runner; Claude review skipped."

      - uses: anthropics/claude-code-action@v1
        if: steps.dario.outputs.available == 'true'
        env:
          ANTHROPIC_BASE_URL: ${{ steps.dario.outputs.base_url }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: dario
          claude_args: "--max-turns 25"
          prompt: |
            Review this pull request for the Headroom open-source project and post concise inline review comments. Approve only if it is clean. Focus on, in priority order:

            1. CORRECTNESS — compression invariants, token accounting, streaming behavior, backward compatibility with wrapped SDKs and eval harnesses.
            2. SECURITY — secret leakage in logs/fixtures, unsafe deserialization, trust-boundary mistakes in the proxy/wrapper.
            3. API / UX — breaking public API changes without migration notes, misleading docs or benchmark claims.

            Be specific with file:line. Do not nitpick style (ruff/mypy/clippy handle that).